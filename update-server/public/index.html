<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheZoneOrder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 500px;
      width: 90%;
    }
    .logo {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .subtitle {
      font-size: 16px;
      opacity: 0.7;
      margin-bottom: 40px;
    }
    .coming-soon {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🍽️</div>
    <h1>TheZoneOrder</h1>
    <p class="subtitle">Online Ordering Platform</p>
    <div class="coming-soon">COMING SOON</div>
    <p class="footer">© 2026 TheZoneOrder. All rights reserved.</p>
  </div>
</body>
</html>
